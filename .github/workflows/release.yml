name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g., 0.1.0-beta.1). If left blank, it will auto-detect and bump the latest beta pre-release number.'
        required: false
        default: ''

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version
        id: get_version
        shell: pwsh
        run: |
          $inputVersion = "${{ github.event.inputs.version }}"
          if ($inputVersion) {
            $version = $inputVersion
          } else {
            # Try to fetch latest tag from git
            git fetch --tags
            $latestTag = git describe --tags --abbrev=0 2>$null
            Write-Host "Latest Git Tag found: $latestTag"
            
            # Match formats like v0.1.0-beta.2 or 0.1.0-beta.2
            if ($latestTag -and $latestTag -match 'v?(\d+\.\d+\.\d+)-beta\.(\d+)') {
              $base = $Matches[1]
              $beta = $Matches[2]
              $next = [int]$beta + 1
              $version = "$base-beta.$next"
            } elseif ($latestTag -and $latestTag -match 'v?(\d+\.\d+\.\d+)') {
              # If it's a stable tag, append beta.1 to the next patch version
              $base = $Matches[1]
              $parts = $base.Split('.')
              $patch = [int]$parts[2] + 1
              $version = "$($parts[0]).$($parts[1]).$patch-beta.1"
            } else {
              # Fallback if no tags exist
              $version = "0.1.0-beta.1"
            }
          }
          
          # Strip 'v' prefix if typed
          $version = $version -replace '^v', ''
          
          # Set as output
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved Target Release Version: $version"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Set Version in Project Files
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          
          # Update package.json version
          (Get-Content package.json) -replace '"version":\s*"[^"]+"', "`"version`": `"$version`"" | Set-Content package.json
          
          # Update tauri.conf.json version
          (Get-Content src-tauri/tauri.conf.json) -replace '"version":\s*"[^"]+"', "`"version`": `"$version`"" | Set-Content src-tauri/tauri.conf.json
          
          # Update Cargo.toml version
          (Get-Content src-tauri/Cargo.toml) -replace 'version\s*=\s*"[^"]+"', "version = `"$version`"" | Set-Content src-tauri/Cargo.toml
          
          Write-Host "Updated project configuration versions to $version"

      - name: Commit version bump
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version to $version [skip ci]" --allow-empty
          git push origin main

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri App and Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.get_version.outputs.VERSION }}
          releaseName: 'KB Android Emulator Manager v${{ steps.get_version.outputs.VERSION }}'
          releaseBody: '🚀 Standalone GPU-accelerated Android Emulator Manager for Windows (Beta).'
          releaseDraft: true
          prerelease: true
